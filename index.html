<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="lock.js" defer></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger: #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}

* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: 0 20px 80px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 82% 14%, rgba(224, 118, 88, 0.16), transparent 45%),
    radial-gradient(circle at 18% 90%, rgba(180, 180, 200, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none;
  z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none;
  z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(-22px, 14px, 0); }
}

.page {
  max-width: 960px;
  margin: 0 auto;
  padding-top: 24px;
}

.dash-title {
  margin: 0 0 20px;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.025em;
  background: linear-gradient(180deg, #FFFFFF 0%, #C7C4BC 120%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  color: transparent;
}
@media (max-width: 480px) { .dash-title { font-size: 22px; } }

/* ===== Bento Grid ===== */
.bento {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-auto-rows: 168px;
  grid-auto-flow: dense;
  gap: 14px;
}

.tile.big  { grid-column: span 2; grid-row: span 2; }
.tile.wide { grid-column: span 2; }

/* Glass tile */
.tile {
  --accent: #FAFAFA;
  position: relative;
  display: flex;
  flex-direction: column;
  padding: 16px 18px 14px;
  border-radius: 18px;
  background: linear-gradient(155deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
  border: 1px solid rgba(255,255,255,0.09);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  text-decoration: none;
  color: var(--text-primary);
  overflow: hidden;
  transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  -webkit-tap-highlight-color: transparent;
}
.tile::before {
  content: '';
  position: absolute; inset: 0; border-radius: inherit;
  background: radial-gradient(ellipse at 70% 0%, rgba(255,255,255,0.04), transparent 60%);
  pointer-events: none;
}
.tile:hover {
  transform: translateY(-3px);
  border-color: color-mix(in srgb, var(--accent) 38%, rgba(255,255,255,0.10));
  box-shadow: 0 10px 36px rgba(0,0,0,0.40);
}
.tile:hover .tile-arrow { transform: translateX(4px); }
.tile:active { transform: translateY(-1px); }

/* Tile internals */
.tile-num {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  letter-spacing: 0.08em;
}
.tile-emoji {
  position: absolute;
  top: 14px; right: 16px;
  font-size: 30px;
  line-height: 1;
  filter: drop-shadow(0 0 10px var(--accent));
  opacity: 0.9;
}
.tile.big .tile-emoji  { font-size: 40px; top: 18px; right: 20px; }
.tile.wide .tile-emoji { font-size: 32px; }

.tile-spacer { flex: 1; min-height: 8px; }

.tile-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  margin-bottom: 5px;
  line-height: 1.2;
}
.tile.big .tile-title { font-size: 24px; }

.tile-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.tile-sub {
  font-size: 11px;
  color: var(--text-tertiary);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.tile-arrow {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  transition: transform 0.18s ease;
  flex-shrink: 0;
}

/* Responsive — 2 col */
@media (max-width: 720px) {
  .bento { grid-template-columns: repeat(2, 1fr); }
  .tile.big { grid-row: span 1; }
  .tile.big .tile-emoji { font-size: 30px; top: 14px; right: 16px; }
  .tile.big .tile-title { font-size: 17px; }
}

/* Responsive — 1 col */
@media (max-width: 440px) {
  .bento { grid-template-columns: 1fr; gap: 10px; }
  .tile.big, .tile.wide { grid-column: span 1; grid-row: span 1; }
}
</style>
</head>
<body>
<div class="page">
  <h1 class="dash-title">Dashboard</h1>

  <div class="bento">

    <a href="main.html" class="tile big" style="--accent:#6BE3A4">
      <span class="tile-num">·01</span>
      <span class="tile-emoji">🏠</span>
      <span class="tile-spacer"></span>
      <div class="tile-title">Main</div>
      <div class="tile-footer">
        <span class="tile-sub">Goals & daily plan</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="gym.html" class="tile wide" style="--accent:#7DD3FC">
      <span class="tile-num">·02</span>
      <span class="tile-emoji">💪</span>
      <span class="tile-spacer"></span>
      <div class="tile-title">Fitness</div>
      <div class="tile-footer">
        <span class="tile-sub">Workouts, splits, sessions</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="health.html" class="tile" style="--accent:#A7F3D0">
      <span class="tile-num">·03</span>
      <span class="tile-emoji">💊</span>
      <span class="tile-spacer"></span>
      <div class="tile-title">Health</div>
      <div class="tile-footer">
        <span class="tile-sub">Supplements & vitals</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="po-water.html" class="tile" style="--accent:#60A5FA">
      <span class="tile-num">·04</span>
      <span class="tile-emoji">💧</span>
      <span class="tile-spacer"></span>
      <div class="tile-title">Water</div>
      <div class="tile-footer">
        <span class="tile-sub">Hydration</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

    <a href="finance.html" class="tile wide" style="--accent:#F2C063">
      <span class="tile-num">·05</span>
      <span class="tile-emoji">📊</span>
      <span class="tile-spacer"></span>
      <div class="tile-title">Finance</div>
      <div class="tile-footer">
        <span class="tile-sub">Net worth & spending</span>
        <span class="tile-arrow">→</span>
      </div>
    </a>

  </div>
</div>
</body>
</html>
